<svg width="1500" height="980" viewBox="0 0 1500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1500" height="980" fill="#08111F"/>
  <text x="70" y="86" fill="#F7FAFC" font-size="40" font-family="Arial, sans-serif" font-weight="700">xMPP Route Economics</text>
  <text x="70" y="124" fill="#9FB2C8" font-size="20" font-family="Arial, sans-serif">How the router chooses x402, MPP charge, or MPP session based on request shape, service hints, and session state</text>

  <rect x="70" y="176" width="420" height="286" rx="24" fill="#13243A" stroke="#203652"/>
  <text x="102" y="228" fill="#F7FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Decision Inputs</text>
  <text x="102" y="280" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">• service capability</text>
  <text x="102" y="318" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">• projected request count</text>
  <text x="102" y="356" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">• streaming / repeated access</text>
  <text x="102" y="394" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">• current session availability</text>
  <text x="102" y="432" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">• policy / budget constraints</text>

  <rect x="540" y="176" width="420" height="286" rx="24" fill="#13243A" stroke="#203652"/>
  <text x="572" y="228" fill="#F7FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Scoring Components</text>
  <text x="572" y="280" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">1. support gate</text>
  <text x="572" y="318" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">2. cost delta vs naive x402</text>
  <text x="572" y="356" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">3. intent fit</text>
  <text x="572" y="394" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">4. service single-call preference</text>
  <text x="572" y="432" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">5. session reuse bonus</text>

  <rect x="1010" y="176" width="420" height="286" rx="24" fill="#13243A" stroke="#203652"/>
  <text x="1042" y="228" fill="#F7FAFC" font-size="28" font-family="Arial, sans-serif" font-weight="700">Key Thresholds</text>
  <text x="1042" y="280" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">research-api prefers exact x402</text>
  <text x="1042" y="318" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">market-api prefers MPP charge</text>
  <text x="1042" y="356" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">stream-api break-even is 4 calls</text>
  <text x="1042" y="394" fill="#F7FAFC" font-size="20" font-family="Arial, sans-serif">existing session removes open cost</text>

  <rect x="70" y="520" width="1360" height="358" rx="24" fill="#13243A" stroke="#203652"/>
  <text x="102" y="574" fill="#F7FAFC" font-size="30" font-family="Arial, sans-serif" font-weight="700">Concrete Route Examples</text>

  <rect x="102" y="620" width="404" height="210" rx="18" fill="#0C1624" stroke="#2A466A"/>
  <text x="132" y="666" fill="#FDE68A" font-size="24" font-family="Arial, sans-serif" font-weight="700">Research API</text>
  <text x="132" y="706" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">1 exact request</text>
  <text x="132" y="742" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">x402: $0.01</text>
  <text x="132" y="778" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">Chosen route: x402</text>
  <text x="132" y="810" fill="#9FB2C8" font-size="16" font-family="Arial, sans-serif">Reason: exact low-friction call and service preference</text>

  <rect x="548" y="620" width="404" height="210" rx="18" fill="#0C1624" stroke="#2A466A"/>
  <text x="578" y="666" fill="#FDE68A" font-size="24" font-family="Arial, sans-serif" font-weight="700">Market API</text>
  <text x="578" y="706" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">1 premium quote request</text>
  <text x="578" y="742" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">x402: $0.04</text>
  <text x="578" y="778" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">mpp-charge: $0.03</text>
  <text x="578" y="814" fill="#86EFAC" font-size="18" font-family="Arial, sans-serif">Chosen route: mpp-charge • saves $0.01</text>

  <rect x="994" y="620" width="404" height="210" rx="18" fill="#0C1624" stroke="#2A466A"/>
  <text x="1024" y="666" fill="#FDE68A" font-size="24" font-family="Arial, sans-serif" font-weight="700">Stream API</text>
  <text x="1024" y="706" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">5 projected streaming calls</text>
  <text x="1024" y="742" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">naive x402: $0.05</text>
  <text x="1024" y="778" fill="#F7FAFC" font-size="18" font-family="Arial, sans-serif">mpp-session-open: $0.03</text>
  <text x="1024" y="814" fill="#86EFAC" font-size="18" font-family="Arial, sans-serif">Chosen route: mpp-session-open • saves $0.02</text>

  <text x="102" y="920" fill="#9FB2C8" font-size="18" font-family="Arial, sans-serif">With an existing session, 5 more stream calls cost $0.025 instead of $0.05 via naive x402, saving another $0.025.</text>
</svg>
